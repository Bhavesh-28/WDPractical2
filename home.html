<!DOCTYPE html>
<html>

<head>
	<title>Home Page</title>
	<link rel="stylesheet" href="home.css">
</head>

<body>
	<h1>Home Page</h1>
	<br>

	<section id="icon" onclick="themeToggle()">
		<div class="innerIcon" id="day">
			<svg xmlns="http://www.w3.org/2000/svg" width="40" height="" fill="currentColor"
				class="bi bi-brightness-low-fill" viewBox="0 0 16 16">
				<path
					d="M12 8a4 4 0 1 1-8 0 4 4 0 0 1 8 0M8.5 2.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0m0 11a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0m5-5a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m-11 0a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9.743-4.036a.5.5 0 1 1-.707-.707.5.5 0 0 1 .707.707m-7.779 7.779a.5.5 0 1 1-.707-.707.5.5 0 0 1 .707.707m7.072 0a.5.5 0 1 1 .707-.707.5.5 0 0 1-.707.707M3.757 4.464a.5.5 0 1 1 .707-.707.5.5 0 0 1-.707.707" />
			</svg>
		</div>
		<div class="innerIcon" id="night">
			<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-moon-fill"
				viewBox="0 0 16 16">
				<path
					d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278" />
			</svg>
		</div>
	</section>

	<section id="form">
		<div>
			<h3>Enter Your Details</h3>
		</div>
		<hr>
		<div>
			<div id="visitor">
				<div class="field">
					<label>Name : </label>
					<br>
					<input type="text" id="name" placeholder="enter your name here" required oninput="checkName(event)">
				</div>
				<div class="error" id="nameError">Only Characters Allowed!</div>

				<div class="field">
					<label>Phone Number : </label>
					<br>
					<input type="text" id="number" placeholder="enter your number here" required
						oninput="checkNumber(event)">
				</div>
				<div class="error" id="phoneDigitsError">Only Numbers Allowed!</div>
				<div class="error" style="margin-top: .2vh; " id="phoneLengthError">Exact 10 Digits Required!</div>

				<div class="field">
					<label>Email : </label>
					<br>
					<input type="email" id="email" placeholder="enter your email here" required
						oninput="checkEmail(event)">
				</div>
				<div class="error" id="emailError">@ not Included!</div>

				<div id="btn">
					<button id="sub" type="submit" onclick="validateForm()">SUBMIT</button>
				</div>
			</div>
		</div>
	</section>

	<section id="dialog">
		<div>
			<p>Welcome <span id="user"><span></p>
		</div>
		<div>
			<p>Would you like to redirect to Resume?</p>
		</div>
		<div id="btncontainer">
			<button id="redirect" type="button" onclick="redirectBtn()">Redirect</button>
		</div>
	</section>

	<section id="foot">
		<footer>&copy; <span id="year"></span> All Rights Reserved</footer>
	</section>
	<script src="home.js"></script>
</body>

</html>
